<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="manifest" href="manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="AniNexus">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <meta name="theme-color" content="#00e5ff">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Favorites — AniNexus</title>
  <meta name="description" content="Your saved anime favorites list.">
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
  <style>
    /* Stats bar */
    .fav-stats {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      margin-bottom: 2rem;
    }
    .fav-stat {
      flex: 1;
      min-width: 120px;
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 1rem 1.25rem;
      text-align: center;
    }
    .fav-stat-num {
      font-family: 'Orbitron', sans-serif;
      font-size: 2rem;
      font-weight: 900;
      color: var(--neon-cyan);
    }
    .fav-stat-label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      margin-top: 4px;
    }

    /* Sort / filter bar */
    .fav-controls {
      display: flex;
      gap: 0.75rem;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 1.75rem;
    }
    .fav-search {
      flex: 1;
      min-width: 200px;
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      color: var(--text-primary);
      padding: 0.55rem 1rem;
      border-radius: 8px;
      font-size: 0.9rem;
      outline: none;
      transition: border-color var(--transition);
    }
    .fav-search:focus { border-color: var(--neon-cyan); }

    .fav-sort {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      color: var(--text-primary);
      padding: 0.55rem 0.85rem;
      border-radius: 8px;
      font-size: 0.88rem;
      outline: none;
      cursor: pointer;
    }

    /* Card extended (shows remove button on hover) */
    .anime-card .remove-fav-btn {
      display: none;
      position: absolute;
      bottom: 8px; right: 8px;
      z-index: 3;
      background: rgba(255,45,120,0.85);
      color: white;
      border: none;
      border-radius: 6px;
      padding: 0.3rem 0.6rem;
      font-size: 0.72rem;
      font-weight: 700;
      cursor: pointer;
      transition: background var(--transition);
    }
    .anime-card:hover .remove-fav-btn { display: block; }
    .anime-card .remove-fav-btn:hover { background: var(--neon-pink); }

    /* Export / import */
    .data-actions {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
    }
  </style>
</head>
<body>

<!-- NAVIGATION -->
<nav class="navbar">
  <a href="index.html" class="nav-logo">ANI<span>NEXUS</span></a>
  <ul class="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="seasonal.html">Seasonal</a></li>
    <li><a href="upcoming.html">Upcoming</a></li>
    <li><a href="favorites.html">Favorites</a></li>
  </ul>
  <div class="nav-search">
    <span class="search-icon">🔍</span>
    <input type="text" id="globalSearch" placeholder="Search anime…" autocomplete="off">
    <div class="search-dropdown" id="searchDropdown"></div>
  </div>
  <div class="nav-controls">
    <button class="btn-icon" id="darkModeBtn" title="Toggle dark mode">🌙</button>
    <a href="favorites.html" class="btn-icon" title="Favorites">❤️</a>
  </div>
  <button class="hamburger btn-icon" id="hamburger">
    <span></span><span></span><span></span>
  </button>
</nav>

<div class="mobile-menu" id="mobileMenu">
  <button class="mobile-menu-close" id="mobileMenuClose">✕</button>
  <a href="index.html">Home</a>
  <a href="seasonal.html">Seasonal</a>
  <a href="upcoming.html">Upcoming</a>
  <a href="favorites.html">Favorites</a>
</div>

<main>
  <div class="page-banner">
    <div class="container">
      <h1 class="page-title">❤️ My Favorites</h1>
      <p class="page-subtitle">Your personal anime watchlist — saved locally.</p>
    </div>
  </div>

  <div class="container" style="padding-top:2rem;padding-bottom:4rem">

    <!-- Stats -->
    <div class="fav-stats" id="favStats">
      <div class="fav-stat">
        <div class="fav-stat-num" id="statTotal">0</div>
        <div class="fav-stat-label">Saved</div>
      </div>
      <div class="fav-stat">
        <div class="fav-stat-num" id="statAvgScore">—</div>
        <div class="fav-stat-label">Avg Score</div>
      </div>
      <div class="fav-stat">
        <div class="fav-stat-num" id="statTypes">—</div>
        <div class="fav-stat-label">Types</div>
      </div>
    </div>

    <!-- Controls -->
    <div class="fav-controls">
      <input
        type="text"
        class="fav-search"
        id="favSearch"
        placeholder="🔍 Filter your favorites…"
      >
      <select class="fav-sort" id="favSort">
        <option value="added">Recently Added</option>
        <option value="title">Title A–Z</option>
        <option value="score">Score</option>
      </select>
      <div class="data-actions">
        <button class="btn btn-secondary" onclick="exportFavorites()" title="Export as JSON">💾 Export</button>
        <button class="btn btn-secondary" onclick="document.getElementById('importFile').click()" title="Import JSON">📂 Import</button>
        <button class="btn btn-danger" onclick="confirmClearAll()">🗑 Clear All</button>
        <input type="file" id="importFile" accept=".json" class="hidden" onchange="importFavorites(event)">
      </div>
    </div>

    <!-- Grid -->
    <div class="anime-grid large" id="favGrid">
      <!-- Filled by JS -->
    </div>

  </div>
</main>

<footer>
  <div class="container">
    <div class="footer-logo">ANINEXUS</div>
    <p class="footer-text">Favorites are stored locally in your browser. They won't sync across devices.</p>
  </div>
</footer>

<script src="script.js"></script>
<script>
/* ============================================================
   FAVORITES PAGE LOGIC
   ============================================================ */

let allFavs     = [];
let displayFavs = [];

/* ---- Render favorites ---- */
function renderFavorites() {
  const grid     = document.getElementById('favGrid');
  const query    = document.getElementById('favSearch').value.toLowerCase().trim();
  const sortKey  = document.getElementById('favSort').value;

  // Filter
  displayFavs = allFavs.filter(a =>
    !query || (a.title || '').toLowerCase().includes(query)
  );

  // Sort
  displayFavs.sort((a, b) => {
    switch (sortKey) {
      case 'title': return (a.title || '').localeCompare(b.title || '');
      case 'score': return (b.score || 0) - (a.score || 0);
      default:      return 0; // added order preserved
    }
  });

  if (!displayFavs.length) {
    if (query) {
      grid.innerHTML = emptyState('🔍', 'No matches', `No favorites match "${escHtml(query)}".`);
    } else {
      grid.innerHTML = emptyState('💔', 'No favorites yet',
        'Browse anime and tap ❤️ to save them here.'
      ) + `<div style="grid-column:1/-1;text-align:center;margin-top:1rem">
        <a href="index.html" class="btn btn-primary">Discover Anime</a>
      </div>`;
    }
    return;
  }

  grid.innerHTML = displayFavs.map(anime => buildFavCard(anime)).join('');
  initLazyLoad(grid);
}

/* ---- Build favorite card (extended with remove button) ---- */
function buildFavCard(anime) {
  const image = anime.images?.jpg?.large_image_url
    || anime.images?.jpg?.image_url
    || IMG_FALLBACK;
  const short = (anime.synopsis || '').slice(0, 120);

  return `
    <article class="anime-card" onclick="navigateTo('anime.html?id=${anime.mal_id}')">
      <div class="card-poster">
        <img
          src="${IMG_FALLBACK}"
          data-src="${escAttr(image)}"
          alt="${escAttr(anime.title)}"
          class="lazy" loading="lazy"
        >
        ${anime.score ? `<div class="score-badge">⭐ ${anime.score}</div>` : ''}
        <button
          class="remove-fav-btn"
          onclick="event.stopPropagation(); removeFav(${anime.mal_id}, this)"
          aria-label="Remove from favorites"
        >Remove</button>
      </div>
      <div class="card-body">
        <h3 class="card-title">${escHtml(anime.title)}</h3>
        <div class="card-meta">
          ${anime.type ? `<span>${escHtml(anime.type)}</span>` : ''}
          ${anime.episodes ? `<span>📺 ${anime.episodes} eps</span>` : ''}
        </div>
        ${short ? `<p class="card-synopsis">${escHtml(short)}</p>` : ''}
      </div>
    </article>
  `;
}

/* ---- Remove a favorite ---- */
function removeFav(id, btn) {
  favorites.remove(id);
  allFavs = favorites.getAll();
  const card = btn.closest('.anime-card');
  card.style.transition = 'opacity 0.3s, transform 0.3s';
  card.style.opacity    = '0';
  card.style.transform  = 'scale(0.85)';
  setTimeout(() => {
    renderFavorites();
    updateStats();
  }, 300);
}

/* ---- Update stats bar ---- */
function updateStats() {
  const all    = favorites.getAll();
  const scores = all.map(a => a.score).filter(Boolean);
  const types  = [...new Set(all.map(a => a.type).filter(Boolean))];

  document.getElementById('statTotal').textContent = all.length;
  document.getElementById('statAvgScore').textContent =
    scores.length ? (scores.reduce((s, v) => s + v, 0) / scores.length).toFixed(1) : '—';
  document.getElementById('statTypes').textContent = types.length || '—';
}

/* ---- Clear all ---- */
function confirmClearAll() {
  if (!allFavs.length) { showToast('No favorites to clear.', 'info'); return; }
  if (!confirm(`Remove all ${allFavs.length} favorites?`)) return;
  localStorage.removeItem('anime_favorites');
  allFavs = [];
  renderFavorites();
  updateStats();
  showToast('All favorites cleared.', 'error');
}

/* ---- Export favorites as JSON ---- */
function exportFavorites() {
  if (!allFavs.length) { showToast('Nothing to export.', 'info'); return; }
  const json = JSON.stringify(allFavs, null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href     = url;
  a.download = 'aninexus-favorites.json';
  a.click();
  URL.revokeObjectURL(url);
  showToast('Favorites exported!', 'success');
}

/* ---- Import favorites from JSON ---- */
function importFavorites(event) {
  const file = event.target.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = e => {
    try {
      const imported = JSON.parse(e.target.result);
      if (!Array.isArray(imported)) throw new Error('Invalid format');

      // Merge with existing
      const existing   = favorites.getAll();
      const existingIds = new Set(existing.map(a => a.mal_id));
      const newItems   = imported.filter(a => !existingIds.has(a.mal_id));

      const merged = [...existing, ...newItems];
      localStorage.setItem('anime_favorites', JSON.stringify(merged));
      allFavs = merged;
      renderFavorites();
      updateStats();
      showToast(`Imported ${newItems.length} new favorites!`, 'success');
    } catch (err) {
      showToast('Import failed — invalid JSON file.', 'error');
    }
  };
  reader.readAsText(file);
  // Reset input
  event.target.value = '';
}

/* ---- Event listeners ---- */
let searchTimer;
document.getElementById('favSearch').addEventListener('input', () => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(renderFavorites, 200);
});

document.getElementById('favSort').addEventListener('change', renderFavorites);

/* ---- Init ---- */
document.addEventListener('DOMContentLoaded', () => {
  allFavs = favorites.getAll();
  renderFavorites();
  updateStats();
});
</script>
<script src="pwa.js"></script>
</body>
</html>
